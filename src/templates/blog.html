<!-- Blog Detail Hero -->
<section class="treatment-detail-hero" style="background-color: var(--color-text-dark); padding: var(--space-lg) 0;">
  <div class="container">
    {{breadcrumb}}
    <div class="blog-meta" style="margin-bottom: 0.5rem;">
      <span class="badge badge-teal">{{category}}</span>
      <span style="color: var(--color-lime-accent); font-weight:600;">{{read_time}}</span>
    </div>
    <h1 style="color: var(--color-white); font-size: 2.5rem; line-height: 1.25;">{{title}}</h1>
    <p style="color: rgba(255,255,255,0.7); font-size: 0.95rem; margin-top: 0.5rem;">Published on {{date}} | By {{author}}</p>
  </div>
</section>

<!-- Blog Content Grid -->
<section class="section">
  <div class="container treatment-detail-grid">
    
    <!-- Left Column: Content -->
    <article class="detail-main" style="line-height: 1.8; font-size: 1.05rem; color: var(--color-text-dark);">
      <!-- Article Content placeholder -->
      {{content}}
    </article>

    <!-- Right Column: Sidebar -->
    <div class="detail-sidebar">
      <div class="detail-sidebar-card">
        <h3>Book Appointment</h3>
        <p class="text-muted" style="font-size: 0.85rem; margin-bottom: 1.25rem;">Have questions about oral health? Schedule a quick callback with our treatment coordinators.</p>
        
        <!-- Form Success State -->
        <div class="form-success" id="contactFormSuccess">
          <div class="form-success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <h3>Request Sent!</h3>
          <p>We will contact you shortly.</p>
        </div>

        <form id="contactForm" class="booking-form" style="grid-template-columns: 1fr;">
          <div>
            <label for="blogName" class="form-label">Full Name*</label>
            <input type="text" id="blogName" class="form-input" required placeholder="Your full name">
          </div>
          <div>
            <label for="blogPhone" class="form-label">Mobile Number*</label>
            <input type="tel" id="blogPhone" class="form-input" required placeholder="10-digit mobile number">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Request Callback</button>
        </form>
      </div>
      
      <!-- Back to Blog Link -->
      <div style="margin-top: 1.5rem; text-align: center;">
        <a href="/blog.html" style="font-weight: 700; color: var(--color-teal); display: inline-flex; align-items: center; gap: 0.25rem;">
          &larr; Back to all articles
        </a>
      </div>
    </div>

  </div>
</section>
